services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: renovessa
      POSTGRES_PASSWORD: renovessa
      POSTGRES_DB: renovessa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U renovessa -d renovessa"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    # Ports: use docker-compose.dev.yml (local) or docker-compose.prod.yml (server)
    environment:
      DATABASE_URL: postgresql://renovessa:renovessa@db:5432/renovessa?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-renovessa-dev-secret-change-in-production}
      NEXT_PUBLIC_APP_URL: http://localhost:7090
      HOSTNAME: "0.0.0.0"
      PORT: 7090
      RUN_SEED: "true"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
