# Nginx reverse proxy for Renovessa (Docker app on 127.0.0.1:7090)
#
# Install:
#   sudo cp deploy/nginx/renovessa.com.conf /etc/nginx/sites-available/renovessa.com
#   sudo ln -sf /etc/nginx/sites-available/renovessa.com /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (after DNS points to this server):
#   sudo certbot --nginx -d renovessa.com -d www.renovessa.com

upstream renovessa_app {
    server 127.0.0.1:7090;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name renovessa.com www.renovessa.com;

    # Certbot webroot (used if you prefer certbot certonly --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        proxy_pass http://renovessa_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
